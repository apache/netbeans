RustAnalyzerPanel.infoPanel.text=<html>\n  <head>\n\n  </head>\n  <body>\n    <h1>About</h1>\n    <p style="margin-top: 0">\n      rust-analyzer is a LSP server for the Rust programming language.\n    </p>\n    <p>\n      LSP server provide IDE independend language support. This includes\n      semantic analysis, error checking, formatting and code completion.\n      NetBeans can make use of such the rust-analyzer LSP to provide\n      language services.\n    </p>\n   <h1>Download</h1>\n    <p style="margin-top: 0">\n        Please follow the instructions on the website of the project:\n        <a href="https://rust-analyzer.github.io/">https://rust-analyzer.github.io/</a>.\n    </p>\n   <h1>Notice</h1>\n    <p style="margin-top: 0">Switching from LSP/to LSP requires a restart of the IDE.</p>\n  </body>\n</html>\n
