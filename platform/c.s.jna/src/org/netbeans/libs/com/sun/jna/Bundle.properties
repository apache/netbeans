# This module exists as an alias module for org.netbeans.libs.jna. The
# NetBeans module works correctly in an OSGI environment if a dependency is
# declared on the packages (Import-Package). It does not work if the OSGI module
# used the upstream bundle name "com.sun.jna" to import the whole bundle.
#
# This module reexports the JNA packages under the original bundle name and version.

OpenIDE-Module-Name=JNA (OSGI)
OpenIDE-Module-Display-Category=Libraries
OpenIDE-Module-Short-Description=OSGI bridge to bundled JNA library.
OpenIDE-Module-Long-Description=This module makes the bundled JNA library available under it original symbolic bundle name
